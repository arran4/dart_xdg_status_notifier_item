name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
      - 'v*.*.*'
      - 'v*.*.*-rc*'
      - 'v*.*.*-beta*'
      - 'test-*'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - format-and-pr
          - build
          - release-snapshot
          - release
          - monthly-maintenance
      increment:
        description: "Version increment to apply when preparing release tags"
        required: false
        default: "patch"
        type: choice
        options: [major, minor, patch, manual]
      manual_version:
        description: "Optional explicit release version (for example 2.4.0 or 2.4.0-uat.2)"
        required: false
        default: ""
        type: string
  schedule:
    - cron: '17 3 1 * *'
    - cron: '41 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write

jobs:
  route:
    name: Route event
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.route.outputs.run_code_checks }}
      run_pr_meta_checks: ${{ steps.route.outputs.run_pr_meta_checks }}
      run_cleanup: ${{ steps.route.outputs.run_cleanup }}
      run_release: ${{ steps.route.outputs.run_release }}
      is_monthly: ${{ steps.route.outputs.is_monthly }}
    steps:
      - id: route
        shell: bash
        run: |
          set -euo pipefail

          run_code_checks=false
          run_pr_meta_checks=false
          run_cleanup=false
          run_release=false
          is_monthly=false

          case "${{ github.event_name }}" in
            push)
              run_code_checks=true
              ;;
            pull_request)
              if [[ "${{ github.event.action }}" == "closed" ]]; then
                run_cleanup=true
              else
                run_pr_meta_checks=true
                run_code_checks=true
              fi
              ;;
            release)
              run_release=true
              ;;
            workflow_dispatch)
              run_code_checks=true
              if [[ "${{ inputs.mode }}" == "release" || "${{ inputs.mode }}" == "release-snapshot" ]]; then
                run_release=true
              fi
              if [[ "${{ inputs.mode }}" == "monthly-maintenance" ]]; then
                is_monthly=true
              fi
              ;;
            schedule)
              run_code_checks=true
              if [[ "${{ github.event.schedule }}" == "17 3 1 * *" ]]; then
                is_monthly=true
              fi
              ;;
          esac

          echo "run_code_checks=$run_code_checks" >> "$GITHUB_OUTPUT"
          echo "run_pr_meta_checks=$run_pr_meta_checks" >> "$GITHUB_OUTPUT"
          echo "run_cleanup=$run_cleanup" >> "$GITHUB_OUTPUT"
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"
          echo "is_monthly=$is_monthly" >> "$GITHUB_OUTPUT"

  discover:
    name: Discover capabilities and cost profile
    needs: route
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.profile }}
      has_dart: ${{ steps.detect.outputs.has_dart }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          [[ -f pubspec.yaml ]] && echo "has_dart=true" >> "$GITHUB_OUTPUT" || echo "has_dart=false" >> "$GITHUB_OUTPUT"

      - id: profile
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event.repository.private }}" == "true" ]]; then
            echo "profile=private" >> "$GITHUB_OUTPUT"
          else
            echo "profile=public" >> "$GITHUB_OUTPUT"
          fi

  dart-format:
    name: Dart format
    needs: [route, discover]
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository) && needs.discover.outputs.has_dart == 'true' && needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart --version
      - run: dart pub get
      - name: Format Check
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'format-and-pr'
        run: dart format --set-exit-if-changed .
      - name: Format and Fix
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'format-and-pr'
        run: |
          dart fix --apply
          dart format .
      - name: Create Pull Request
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'format-and-pr'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: apply format and lint fixes"
          title: "chore: format and lint fixes"
          body: "Automated format and lint fixes created by CI pipeline."
          branch: "chore/format-and-lint-fixes"
          delete-branch: true

  dart-analyze:
    name: Dart analyze
    needs: [route, discover]
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository) && needs.discover.outputs.has_dart == 'true' && needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart --version
      - run: dart pub get
      - run: dart analyze

  dart-test:
    name: Dart test
    needs: [route, discover]
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository) && needs.discover.outputs.has_dart == 'true' && needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart --version
      - run: dart pub get
      - run: dart test

  dart-release-prep:
    name: Dart release prep
    needs: [route, discover, dart-format, dart-analyze, dart-test]
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository) && github.event_name == 'workflow_dispatch' && (inputs.mode == 'release' || inputs.mode == 'release-snapshot') && needs.discover.outputs.has_dart == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
      - name: Compute version and tag
        env:
          INCREMENT: ${{ inputs.increment }}
          MANUAL_VERSION_INPUT: ${{ inputs.manual_version }}
        run: |
          set -euo pipefail
          PUBSPEC_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml)
          git fetch --tags
          HIGHEST_TAG=$(git tag -l "v*" | sed 's/^v//' | sort -V | tail -n 1)
          [ -z "$HIGHEST_TAG" ] && HIGHEST_TAG="0.0.0"

          CURRENT_VERSION=$(echo -e "$PUBSPEC_VERSION\n$HIGHEST_TAG" | sort -V | tail -n 1)

          if [ "$INCREMENT" = "manual" ]; then
            [ -z "$MANUAL_VERSION_INPUT" ] && { echo "manual_version required"; exit 1; }
            NEW_VERSION="$MANUAL_VERSION_INPUT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            case "$INCREMENT" in
              major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
              minor) NEW_VERSION="$MAJOR.$((MINOR+1)).0" ;;
              *) NEW_VERSION="$MAJOR.$MINOR.$((PATCH+1))" ;;
            esac
          fi

          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v$NEW_VERSION"
          git add pubspec.yaml
          git commit -m "Bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          git push origin "release/v$NEW_VERSION"

  publish-dart:
    name: Publish Dart Package to pub.dev
    needs: [route, discover, dart-format, dart-analyze, dart-test, dart-release-prep]
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository) && needs.route.outputs.run_release == 'true' && needs.discover.outputs.has_dart == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Publish to pub.dev
        run: dart pub publish --force

  release-example:
    name: Release Example App
    needs: publish-dart
    if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest] # , windows-latest, macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Compile example (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: dart compile exe example/example.dart -o example_app

      - name: Compile example (Windows)
        if: runner.os == 'Windows'
        run: dart compile exe example/example.dart -o example_app.exe

      - name: Zip example (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: zip example_app-${{ runner.os }}.zip example_app

      - name: Zip example (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path example_app.exe -DestinationPath example_app-Windows.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: example_app-${{ runner.os }}.zip
